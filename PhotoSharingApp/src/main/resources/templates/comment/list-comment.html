<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layout}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}" defer></script>
<title th:text=#{listCommentPage}></title>
</head>
<body>
	<div layout:fragment="content">
		
		<div class="container">
			<div class="row justify-content-center">
				<div class="mx-auto">
					<div class="d-flex justify-content-between align-items-center border-bottom py-3 mb-3">
						<nav aria-label="breadcrumb">
							<ol class="breadcrumb fw-bold fs-2 m-0">
								<li class="breadcrumb-item active" aria-current="page" th:text="#{listCommentPage}"></li>
							</ol>
						</nav>
					</div>
					
					<div class="row d-flex justify-content-center align-items-center border-bottom pb-3 mx-0 mb-3">
					
						<form method="post" th:action="@{/list-comment}" th:object="${listCommentForm}">
							<div class="row">
								<div class="input-group input-group-lg">
									<span th:text="#{comment}" id="group-text" class="input-group-text text-secondary"></span>
									
									<textarea th:field="*{comment}" 
										th:errorclass="is-invalid" class="form-control text-wrap" aria-describedby="group-text">
									</textarea>
								
									<input type="submit" th:value="#{uploadBtn}" id="group-text" class="btn btn-outline-primary rounded-end">
									
									<div class="invalid-feedback text-center" th:if="${#fields.hasErrors('comment')}" 
										th:errors="*{comment}">
									</div>
								</div>
							</div>
						</form>
					</div>
				</div>
				<div class="col mx-auto">
					<div th:each="list:${commentList}" class="card mb-3">
						<div class="card-body">
							<div class="d-flex justify-content-between align-items-center">
								<div class="d-inline-flex my-2">
									<div th:text="'▼ ' + ${list.Account?.username?: 'unknown'}"
										class="me-3"></div>
									<div th:text="${#dates.format(list.createDateTime,'yyyy-MM-dd hh:mm:ss')}"
										class="me-3"></div>
								</div>

								<div class="row me-1">
									<th:block th:if="${list.Account?.username != null and list.Account.username == loginUser}">
										<!-- Button trigger modal -->
										<button type="button" th:text="#{deleteBtn}"
											data-bs-toggle="modal" th:data-bs-target="'#' + ${list.id}"
											class="btn btn-outline-danger"></button>
										<!-- /Button trigger modal -->
									</th:block>
								</div>
							</div>

							<div class="row">
								<pre th:text="${list.comment}" class="card-text fs-5"></pre>
							</div>
						</div>

						<!-- Modal -->
						<div class="modal fade" th:id="${list.id}" tabindex="-1"
							aria-labelledby="exampleModalLabel" aria-hidden="true">
							<div class="modal-dialog">
								<div class="modal-content rounded-4 shadow">
									<div class="modal-header border-bottom-0">
										<h1 class="modal-title fs-5" id="exampleModalLabel"
											th:text="${list.comment}"></h1>
										<button type="button" class="btn-close"
											data-bs-dismiss="modal" aria-label="Close"></button>
									</div>
									<div class="modal-body py-0">
										<div th:text="#{deleteCommentAlert}"></div>
									</div>
									<form method="post" th:action="@{/delete-comment}">
										<div class="modal-footer flex-column align-items-stretch w-100 gap-2 pb-3 border-top-0">
											<input type="hidden" name="id" th:value="${list.id}">
											<input type="submit" th:value="#{deleteBtn}" class="btn btn-lg btn-danger">
											<a th:href="@{'/list-comment'}" th:text="#{cancelBtn}" data-bs-dismiss="modal" class="btn btn-lg btn-secondary"></a>
										</div>
									</form>
								</div>
							</div>
						</div>
						<!-- /Modal -->

					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
