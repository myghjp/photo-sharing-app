<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layout}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet"
	th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}" defer></script>
<title th:text="#{dashboardPage}"></title>
</head>
<body>

	<div layout:fragment="content" class="overflow-hidden">
		<div class="container">
			<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center border-bottom py-3 mb-3">
				<nav aria-label="breadcrumb">
					<ol class="breadcrumb fs-2 m-0">
						<li class="breadcrumb-item active" aria-current="page" th:text="#{dashboardPage}"></li>
					</ol>
				</nav>
			</div>
			
			<div class="row mb-4 g-4">
	        	<div class="col-lg-4 col-sm-6">
	            	<div class="card">
                		<div class="card-header">
					    	<div class="text-center fw-bold" th:text="#{admin}"></div>
						</div>
						<div class="card-body" style="height: 100px;">
					    	<div class="card-text text-start fs-4" th:text="${adminInfo.account.username}"></div>
						</div>
	                </div>
	            </div>
	        
		        <div class="col-lg-4 col-sm-6">
		            <div class="card">
	                	<div class="card-header">
							<div class="text-center fw-bold" th:text="#{memberCount}"></div>
						</div>
						<div class="card-body" style="height: 100px;">
							<div class="card-text text-end fw-bold fs-1" th:text="${countMembers}"></div>
						</div>
		            </div>
		        </div>
		         
		        <div class="col-lg-4 col-sm-6">
		            <div class="card">
						<div class="card-header">
						    <div class="text-center fw-bold" th:text="#{albumCount}"></div>
						</div>
						<div class="card-body" style="height: 100px;">
						    <div class="card-text text-end fw-bold fs-1" th:text="${countAlbums}"></div>
						</div>
					</div>
		        </div>
		    </div>
			
			<div class="row g-4">
				<div class="col-lg-6 col-md-6 mb-md-0">
					<table class="table table-striped border">
						<thead>
							<tr class="text-center">
								<th scope="col" th:text="#{userTable}"></th>
							</tr>
						</thead>
						
						<tbody class="d-block overflow-y-scroll" style="height: 250px;">
							<tr class="d-block">
								<td class="d-block align-middle w-100 py-2" th:text="${adminInfo.account.username}"></td>
							</tr>
							<tr th:each="list,status:${memberList}" class="d-block">
								<td th:text="${list.account?.username?: 'unknown'}" class="d-block py-2"></td>
							</tr>
						</tbody>
					</table>
				</div>
				
				<div class="col-lg-6 col-md-6 mb-md-0">
					<table class="table table-striped border">
						<thead>
							<tr class="text-center">
								<th scope="col" th:text="#{selectAlbumPage}"></th>
							</tr>
						</thead>
						
						<tbody class="d-block overflow-y-scroll" style="height: 250px;">
							<tr th:each="list:${albumList}" class="d-block">
								<td class="d-block align-middle py-2">
									<form method="post" th:action="@{/select-album}">
										<button type="submit" th:text="${list.albumName}" name="id" th:value="${list.id}"
											class="rounded list-group-item list-group-item-action text-primary">
										</button>
									</form>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
				
			</div>
		</div>
	</div>
</body>
</html>
